title: "Planning Under Uncertainty"
subtitle: "PowerUp 2026"
logo: "/favicon.svg"
description: "Energy Infrastructure Planning Under Uncertainty @ PowerUp 2026"
url: "https://pu26-uncertainty.github.io"
baseurl: ""
repository: "pu26-uncertainty/pu26-uncertainty.github.io"

favicon: "/favicon.ico"

remote_theme: "mmistakes/minimal-mistakes@4.27.3"
minimal_mistakes_skin: "air"

plugins:
